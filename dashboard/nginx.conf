server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # serve index.html for any client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # proxy the API to the backend service so the browser stays same-origin (no CORS).
    location /api/ {
        proxy_pass http://core:8000/api/;
    }

    # proxy FastAPI's docs and OpenAPI schema
    location /docs {
        proxy_pass http://core:8000/docs;
    }

    location /redoc {
        proxy_pass http://core:8000/redoc;
    }

    location = /openapi.json {
        proxy_pass http://core:8000/openapi.json;
    }
}
